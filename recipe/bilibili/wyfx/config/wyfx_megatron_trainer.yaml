# Adapting for the customizable parameters for wyfx in bilibili.

hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_megatron_trainer
  - _self_

reward_model:
  reward_kwargs:
    reward_num_processes: 8
    max_resp_len: 1024
    grm:
      use_llm_verify: False
      llm_server_ip: null
      llm_server_port: null
      genRM_app_address: null
      instruct_follow_app_address: null
      reward_model_app_address: null
    overlong_buffer:
      enable: False
      len: 0
      penalty_factor: 0
      log: Fasle

actor_rollout_ref:
  actor:
    checkpoint:
      export: True
      default_local_dir: checkpoints
      delete_after_upload: False

trainer:
  val_generations_to_log_to_txt: 200
  summary_dir: /summary_dir

# Placehold for cluster-params(beats), unused.
d_train_dir: null
d_pre_model_dir: null
d_model_dir: null
d_summary_dir: null
d_result_dir: null
config: null
